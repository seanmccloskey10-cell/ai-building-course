<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lexicon - The Daily Word Challenge</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Lexicon</h1>
        <p class="subtitle">The Daily Word Challenge</p>
    </header>

    <main>
        <section id="how-to-play">
            <h2>How to Play</h2>
            <p>Guess the 5-letter word in 6 tries. After each guess, tiles change color:</p>
            <div class="color-examples">
                <div class="example">
                    <span class="example-tile green">A</span>
                    <span>Correct letter, correct position</span>
                </div>
                <div class="example">
                    <span class="example-tile yellow">B</span>
                    <span>Correct letter, wrong position</span>
                </div>
                <div class="example">
                    <span class="example-tile gray">C</span>
                    <span>Letter not in word</span>
                </div>
            </div>
        </section>

        <div id="game-board">
            <div class="tile-row">
                <div class="tile"></div>
                <div class="tile"></div>
                <div class="tile"></div>
                <div class="tile"></div>
                <div class="tile"></div>
            </div>
            <div class="tile-row">
                <div class="tile"></div>
                <div class="tile"></div>
                <div class="tile"></div>
                <div class="tile"></div>
                <div class="tile"></div>
            </div>
            <div class="tile-row">
                <div class="tile"></div>
                <div class="tile"></div>
                <div class="tile"></div>
                <div class="tile"></div>
                <div class="tile"></div>
            </div>
            <div class="tile-row">
                <div class="tile"></div>
                <div class="tile"></div>
                <div class="tile"></div>
                <div class="tile"></div>
                <div class="tile"></div>
            </div>
            <div class="tile-row">
                <div class="tile"></div>
                <div class="tile"></div>
                <div class="tile"></div>
                <div class="tile"></div>
                <div class="tile"></div>
            </div>
            <div class="tile-row">
                <div class="tile"></div>
                <div class="tile"></div>
                <div class="tile"></div>
                <div class="tile"></div>
                <div class="tile"></div>
            </div>
        </div>

        <div id="keyboard">
            <div class="keyboard-row">
                <button class="key">Q</button>
                <button class="key">W</button>
                <button class="key">E</button>
                <button class="key">R</button>
                <button class="key">T</button>
                <button class="key">Y</button>
                <button class="key">U</button>
                <button class="key">I</button>
                <button class="key">O</button>
                <button class="key">P</button>
            </div>
            <div class="keyboard-row">
                <button class="key">A</button>
                <button class="key">S</button>
                <button class="key">D</button>
                <button class="key">F</button>
                <button class="key">G</button>
                <button class="key">H</button>
                <button class="key">J</button>
                <button class="key">K</button>
                <button class="key">L</button>
            </div>
            <div class="keyboard-row">
                <button class="key key-wide">ENTER</button>
                <button class="key">Z</button>
                <button class="key">X</button>
                <button class="key">C</button>
                <button class="key">V</button>
                <button class="key">B</button>
                <button class="key">N</button>
                <button class="key">M</button>
                <button class="key key-wide">&#9003;</button>
            </div>
        </div>

        <div id="message"></div>

        <div id="modal-overlay" class="modal-overlay">
            <div class="modal-content">
                <p id="modal-message"></p>
                <button id="play-again" onclick="location.reload()">Play again</button>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 Lexicon. Follow us on <a href="https://x.com/lexicon" target="_blank">X</a></p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
