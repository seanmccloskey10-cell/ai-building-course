<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iron Habits - Forge Your Discipline</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <h1>⚡ IRON HABITS</h1>
        <p class="tagline">Build yourself, one day at a time</p>
    </header>

    <main class="main-content">
        <section class="habit-selection">
            <h2>Select Your Habits</h2>
            <div id="habit-list"></div>
        </section>

        <section class="tracker-section" id="tracker-section">
            <div class="tracker-header">
                <h2>Track Your Week</h2>
                <button id="reset-btn" class="reset-btn">Reset Habits</button>
            </div>
            <div id="habit-tracker"></div>
            <button id="submit-btn" class="submit-btn">Submit Habits</button>
        </section>
    </main>

    <div id="celebration-container" class="celebration-container"></div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h2>⚡ DISCIPLINE LOGGED</h2>
            <p>Keep forging your iron will.</p>
            <button id="modal-close" class="modal-btn">CONTINUE</button>
        </div>
    </div>

    <footer class="footer">
        <div class="social-links">
            <a href="#">X</a>
            <a href="#">Instagram</a>
            <a href="#">TikTok</a>
        </div>
        <p>© 2024 Iron Habits. Forge your discipline.</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
