<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dear Diary</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Lato:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="lock-icon" id="lockIcon">🔒</div>
            <h1>Dear Diary</h1>
        </div>

        <!-- Auth Section -->
        <div class="card">
            <h2>Account</h2>
            <div id="authFields">
                <input type="email" id="email" placeholder="Email">
                <input type="password" id="password" placeholder="Password (min 6 characters)">
            </div>
            <div class="button-group">
                <button id="signUpBtn">Sign Up</button>
                <button id="logInBtn">Log In</button>
                <button id="logOutBtn">Log Out</button>
            </div>
            <p id="authStatus"></p>
        </div>

        <!-- Diary Section -->
        <div id="diarySection" class="hidden">
            <div class="card">
                <h2>New Entry</h2>
                <input type="text" id="entryTitle" placeholder="Entry title">
                <textarea id="entryContent" placeholder="Write your thoughts..."></textarea>
                <button id="saveEntryBtn" class="save-btn">Save Entry</button>
            </div>

            <!-- Entries List -->
            <div class="card">
                <h2>My Entries</h2>
                <div id="entriesList"></div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer"></div>

    <script src="Supabase-Configuration.js"></script>
    <script src="app.js"></script>
</body>
</html>
